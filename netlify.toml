[build]
  command = ""
  publish = "."

[[headers]]
  for = "/*"
    [headers.values]
    Content-Security-Policy = "default-src 'self'; media-src 'self' https://res.cloudinary.com; img-src 'self' https://res.cloudinary.com data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self';"
