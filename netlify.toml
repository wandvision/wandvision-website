[build]
  publish = "."

# Redirecti za sve stranice bez .html ekstenzije
[[redirects]]
  from = "/wandgestaltung"
  to = "/wandgestaltung/"
  status = 301

[[redirects]]
  from = "/buero-wandgestaltung"
  to = "/buero-wandgestaltung/"
  status = 301

[[redirects]]
  from = "/restaurant-wandgestaltung"
  to = "/restaurant-wandgestaltung/"
  status = 301

[[redirects]]
  from = "/praxis-wandgestaltung"
  to = "/praxis-wandgestaltung/"
  status = 301

[[redirects]]
  from = "/wandgestaltung-aalen"
  to = "/wandgestaltung-aalen/"
  status = 301

[[redirects]]
  from = "/wandgestaltung-ulm"
  to = "/wandgestaltung-ulm/"
  status = 301

[[redirects]]
  from = "/wandgestaltung-heidenheim"
  to = "/wandgestaltung-heidenheim/"
  status = 301

# Postojeći redirecti
[[redirects]]
  from = "/wanddruck"
  to = "/wanddruck/"
  status = 301

[[redirects]]
  from = "/bodendruck"
  to = "/bodendruck/"
  status = 301

[[redirects]]
  from = "/sonderflaechen"
  to = "/sonderflaechen/"
  status = 301

[[redirects]]
  from = "/einsatzbereiche"
  to = "/einsatzbereiche/"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/faq/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

# Headers
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
