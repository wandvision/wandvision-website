<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Seite nicht gefunden | WandVision K&K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"><noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'"><noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            padding: 20px;
            text-align: center;
        }
        .error-content {
            max-width: 560px;
        }
        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            color: rgba(255,255,255,0.15);
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: clamp(1.4rem, 3vw, 2rem);
            color: #fff;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .error-text {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .error-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-btn-home {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            background: #fff;
            color: var(--dark-blue);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            min-height: 52px;
        }
        .error-btn-home:hover {
            background: #EFF6FF;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
        }
        .error-btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 2px solid rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            min-height: 52px;
        }
        .error-btn-contact:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.7);
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .error-buttons { flex-direction: column; align-items: center; }
            .error-btn-home, .error-btn-contact { width: 100%; max-width: 280px; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Seite nicht gefunden</h1>
            <p class="error-text">Die angeforderte Seite existiert leider nicht oder wurde verschoben. Kein Problem — wir bringen Sie zurück auf den richtigen Weg.</p>
            <div class="error-buttons">
                <a href="index.html" class="error-btn-home">
                    <i class="fas fa-home"></i> Zur Startseite
                </a>
                <a href="tel:+4917641608973" class="error-btn-contact">
                    <i class="fas fa-phone-alt"></i> Anrufen
                </a>
            </div>
        </div>
    </div>
</body>
</html>
